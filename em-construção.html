<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Erika Messias Psicóloga Coach</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* BACKGROUND */
    body {
      background: url("assets/img/erika-em-construção.png") no-repeat center center;
      background-size: cover;
      background-position: center -770px;
      /* 👈 desce a imagem */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* OVERLAY ESCURO SUAVE */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 0;
    }

    /* CONTEÚDO CENTRAL */
    .container {
      position: relative;
      z-index: 1;

      background: rgba(255, 255, 255, 0.5);
      padding: 50px 40px;
      border-radius: 16px;

      max-width: 600px;
      width: 90%;

      text-align: center;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(5px);
    }

    /* TÍTULO */
    h1 {
      font-size: 32px;
      color: #411f03;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    /* SUBTÍTULO */
    p {
      font-size: 16px;
      color: #531f01;
      margin-bottom: 25px;
    }

    /* NOME */
    .nome {
      font-size: 32px;
      font-weight: 600;
      color: #531f01;
      margin-bottom: 10px;
    }

    /* PROFISSÃO */
    .profissao {
      font-size: 16px;
      color: #531f01;
      margin-bottom: 5px;
    }

    .registro {
      font-size: 14px;
      color: #531f01;
      margin-bottom: 25px;
    }

    /* CONTATO */
    .contato {
      font-size: 18px;
      font-weight: bold;
      color: #531f01;
    }

    /* RESPONSIVO */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 22px;
      }

      .nome {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Nosso site está em construção</h1>
    <p>Em breve voltaremos com novidades para você.</p>

    <div class="nome">Erika Messias</div>
    <div class="profissao">Psicóloga Coach</div>
    <div class="registro">CRP: 04/52906</div>

    <p>Para agendamentos e informações:</p>
    <div class="contato">(31) 99848-8478</div>
  </div>

</body>

</html>
